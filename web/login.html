<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Chat App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="screen">
    <div class="card">
      <div class="card-header">
        <a href="index.html" class="back-btn">&#8592;</a>
        <h2>Login</h2>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required />
          <span class="field-msg" id="usernameMsg"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required />
            <button type="button" class="toggle-pwd" onclick="togglePassword('password', this)">Show</button>
          </div>
          <span class="field-msg" id="passwordMsg"></span>
        </div>

        <button type="submit" class="btn btn-primary full-width">Login</button>
      </form>

      <div id="successBanner" class="banner banner-success hidden">
        <strong id="welcomeMsg"></strong>
      </div>

      <div id="errorBanner" class="banner banner-error hidden">
        <strong>Username or password incorrect, please try again.</strong>
      </div>

      <p class="footer-link">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>

  <script src="validation.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const enteredUsername = document.getElementById("username").value.trim();
      const enteredPassword = document.getElementById("password").value;

      setMsg("usernameMsg", "", "");
      setMsg("passwordMsg", "", "");
      document.getElementById("successBanner").classList.add("hidden");
      document.getElementById("errorBanner").classList.add("hidden");

      if (!enteredUsername) { setMsg("usernameMsg", "Username is required.", "error"); return; }
      if (!enteredPassword)  { setMsg("passwordMsg", "Password is required.", "error"); return; }

      const stored = sessionStorage.getItem("user");
      if (!stored) {
        document.getElementById("errorBanner").classList.remove("hidden");
        document.getElementById("errorBanner").querySelector("strong").textContent =
          "No account found. Please register first.";
        return;
      }

      const user = JSON.parse(stored);
      if (user.username === enteredUsername && user.password === enteredPassword) {
        document.getElementById("welcomeMsg").textContent =
          `Welcome ${user.firstName}, ${user.lastName} it is great to see you again.`;
        document.getElementById("successBanner").classList.remove("hidden");
      } else {
        document.getElementById("errorBanner").classList.remove("hidden");
        document.getElementById("errorBanner").querySelector("strong").textContent =
          "Username or password incorrect, please try again.";
      }
    });
  </script>
</body>
</html>
